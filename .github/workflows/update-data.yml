name: Update Portal Data

on:
  push:
    paths:
      - "Datamart_Risiko_Operasional.xlsx"
  workflow_dispatch: {}

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data.js (strict mode — gagal jika ada warning data)
        run: python update_data.py --strict

      - name: Commit & push hasil update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.js
          git diff --quiet --cached || git commit -m "auto: update data.js"
          git push
